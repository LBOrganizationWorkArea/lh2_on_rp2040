<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LBEES GCS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111; color: #ccc;
  font-family: 'Courier New', monospace;
  display: flex; height: 100vh; overflow: hidden;
}

/* ── Left panel ──────────────────────────────────────────────── */
#panel {
  width: 336px; min-width: 336px; background: #161616;
  border-right: 1px solid #222; padding: 8px;
  display: flex; flex-direction: column; gap: 5px; overflow: hidden;
}.lbl   { font-size: 10px; color: #555; letter-spacing: 1px; }
hr     { border: none; border-top: 1px solid #222; margin: 1px 0; }
.flag  { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #999; }
.dim   { font-size: 10px; color: #3d3d3d; }
#horizon-canvas { display: block; border-radius: 3px; flex: none; }
#att-angles { font-size: 10px; color: #555; text-align: center; min-height: 12px; }
.pos-val { font-size: 12px; color: #aaa; }
/* Mode floating widget (mirrors conn-widget style) */
#mode-widget {
  position: absolute; top: 12px; left: 12px; z-index: 20;
  background: rgba(16,16,16,0.93); border: 1px solid #282828; border-radius: 5px;
  padding: 10px 14px; display: flex; flex-direction: column; align-items: center; gap: 5px;
  backdrop-filter: blur(6px); min-width: 110px;
}
#mode-widget .lbl { font-size: 10px; color: #555; letter-spacing: 1px; }
#fc-mode { font-size: 16px; font-weight: bold; color: #3DFF7A; text-align: center; }
/* Status badges */
#fc-armed {
  text-align: center; padding: 7px 4px; border-radius: 3px;
  font-size: 15px; font-weight: bold; border: 1px solid #2a2a2a;
  background: #111; letter-spacing: 1px; color: #555;
}
#status-row-2 { display: flex; gap: 4px; }
.sbadge-sm {
  flex: 1; text-align: center; padding: 6px 2px; border-radius: 3px;
  font-size: 10px; font-weight: bold; border: 1px solid #2a2a2a;
  background: #111; letter-spacing: 0.5px; color: #555;
}

/* MAVLink monitor */
#mavlog-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
#mavlog {
  flex: 1; overflow-y: auto; min-height: 0;
  background: #0e0e0e; border: 1px solid #1e1e1e; border-radius: 3px; padding: 3px;
}
.ml     { font-size: 10px; line-height: 1.5; white-space: normal; word-break: break-all; overflow: visible; }
.ml-ts  { color: #2e2e2e; margin-right: 5px; }
.ml-hb  { color: #8a7abc; }
.ml-ekf { color: #c4c44a; }
.ml-wp  { color: #7acc7a; }
.ml-ack { color: #9a9acc; }
.ml-info { color: #888; }
.ml-warn { color: #c49a50; }
.ml-err  { color: #cc5050; }

/* ── 3-D scene ───────────────────────────────────────────────── */
#scene-container { flex: 1; position: relative; overflow: hidden; }
#scene-container canvas,
#scene-container > div:not(#scale-bar-wrap):not(#webserial-warn):not(#conn-area):not(#mode-widget) {
  position: absolute !important; top:0; left:0;
  width:100% !important; height:100% !important;
}
.label {
  font-size: 13px; font-family: monospace;
  pointer-events: none; user-select: none;
  text-shadow: 0 0 4px #000;
}
#scale-bar-wrap {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  pointer-events: none; z-index: 10;
}
#scale-line { height: 3px; background: #aaa; border-left: 2px solid #aaa; border-right: 2px solid #aaa; min-width: 4px; }
#scale-text { font-size: 11px; color: #aaa; letter-spacing: 0.5px; white-space: nowrap; }
#webserial-warn {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  background: #3a1a00; border: 1px solid #a06020; color: #ffa040;
  padding: 6px 14px; border-radius: 4px; font-size: 12px;
  z-index: 20; pointer-events: none; display: none;
}

/* Connection + tools column */
#conn-area {
  position: absolute; top: 12px; right: 12px; z-index: 20;
  display: flex; flex-direction: column; gap: 6px; width: 186px;
}
#conn-widget {
  background: rgba(16,16,16,0.93); border: 1px solid #282828; border-radius: 5px;
  padding: 10px 10px 8px; display: flex; flex-direction: column; gap: 6px;
  backdrop-filter: blur(6px);
}
#conn-widget .lbl { font-size: 10px; color: #555; letter-spacing: 1px; }
.row { display: flex; align-items: center; gap: 6px; }
.row span { color: #555; font-size: 11px; }
select {
  background: #1e1e1e; color: #ddd; border: 1px solid #2e2e2e; border-radius: 3px;
  padding: 3px 6px; font-size: 12px; font-family: monospace; width: 110px; outline: none; cursor: pointer;
}
select:focus { border-color: #444; }
button {
  background: #2a2000; color: #fbc707; border: 1px solid #fbc707;
  border-radius: 3px; padding: 5px; width: 100%; cursor: pointer;
  font-size: 11px; font-family: monospace; letter-spacing: 1px;
}
button:hover { background: #3a2e00; }
button.active { background: #3a1a1a; color: #FF6666; border-color: #FF6666; }
.small-st { font-size: 10px; color: #555; min-height: 12px; }
#telem-st { font-size: 13px; font-weight: bold; }
/* Serial / UDP type tabs */
.type-tabs { display: flex; margin-bottom: 2px; }
.type-tab  { flex: 1; width: auto; padding: 4px 2px; font-size: 10px; letter-spacing: 1px;
             background: #111; color: #555; border: 1px solid #2a2a2a; border-radius: 3px;
             position: relative; }
.type-tab:first-child { border-radius: 3px 0 0 3px; }
.type-tab:last-child  { border-radius: 0 3px 3px 0; margin-left: -1px; }
.type-tab.sel         { background: #2a2000; color: #fbc707; border-color: #fbc707; z-index: 1; }
.type-tab.sel:hover   { background: #2a2000; }
.type-tab:not(.sel):hover { background: #1a1a1a; color: #888; }
#udp-port {
  background: #1e1e1e; color: #ddd; border: 1px solid #2e2e2e; border-radius: 3px;
  padding: 3px 6px; font-size: 12px; font-family: monospace; width: 72px; outline: none;
}
#udp-port:focus { border-color: #444; }
#udp-port::-webkit-inner-spin-button,
#udp-port::-webkit-outer-spin-button { -webkit-appearance: none; }
/* ── Hamburger menu ─────────────────────────────────────────────────────────── */
#menu-widget { position: relative; }
#menu-btn {
  background: rgba(16,16,16,0.93); border: 1px solid #282828; border-radius: 5px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 14px; width: 100%; backdrop-filter: blur(6px);
}
#menu-btn:hover { background: rgba(28,28,28,0.97); }
.hb-line { width: 18px; height: 2px; background: #fbc707; border-radius: 1px; pointer-events: none; }
#menu-dropdown {
  position: absolute; top: calc(100% + 4px); right: 0; width: 100%;
  background: rgba(14,14,14,0.98); border: 1px solid #282828; border-radius: 5px;
  display: flex; flex-direction: column; overflow: hidden;
  backdrop-filter: blur(6px); z-index: 30;
}
.menu-item {
  width: 100%; padding: 9px 12px; text-align: left;
  background: transparent; border: none; border-bottom: 1px solid #1e1e1e;
  font-size: 11px; font-family: monospace; letter-spacing: 1px;
  color: #fbc707; cursor: pointer; text-decoration: none; display: block;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: #2a2000; color: #fbc707; }

/* ── LH pose editor modal ───────────────────────────────────────────────────── */
#lh-modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.72); align-items: center; justify-content: center;
}
#lh-modal.open { display: flex; }
#lh-modal-box {
  background: #161616; border: 1px solid #282828; border-radius: 6px;
  padding: 16px; width: 340px; display: flex; flex-direction: column; gap: 12px;
}
#lh-modal-box .modal-title { font-size: 12px; color: #888; letter-spacing: 2px; }
#lh-sel { display: flex; }
.lh-tab {
  flex: 1; padding: 5px; font-size: 11px; letter-spacing: 1px;
  background: #111; color: #555; border: 1px solid #2a2a2a; border-radius: 3px; position: relative;
}
.lh-tab:not(:first-child) { margin-left: -1px; }
.lh-tab.sel { background: #2a2000; color: #fbc707; border-color: #fbc707; z-index: 1; }
.lh-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.lh-field { display: flex; flex-direction: column; gap: 3px; }
.lh-field span { font-size: 9px; color: #555; letter-spacing: 1px; }
.lh-field input {
  background: #1e1e1e; color: #ddd; border: 1px solid #2e2e2e; border-radius: 3px;
  padding: 4px 6px; font-size: 12px; font-family: monospace; outline: none; width: 100%;
}
.lh-field input:focus { border-color: #444; }
.lh-btns { display: flex; gap: 8px; }
.lh-btns button { flex: 1; }
.btn-cancel { background: #111 !important; color: #666 !important; border-color: #2a2a2a !important; }
.btn-cancel:hover { background: #1a1a1a !important; color: #888 !important; }
</style>
</head>

<script type="module">
import * as THREE                     from 'three';
import { OrbitControls }              from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ─── Lighthouse config ────────────────────────────────────────────────────────
const LIGHTHOUSES = [
  { id:'0', pos:[0.0,0.0,-1.5], R:[[ 0,-1,0],[ 1,0,0],[ 0,0,1]] },
  { id:'1', pos:[1.0,0.0,-1.5], R:[[ 0,-1,0],[ 1,0,0],[ 0,0,1]] },
];

// ─── MAVLink v2 parser ────────────────────────────────────────────────────────
//   Parsed silently (feed widgets, never logged):
//     1  SYS_STATUS, 24 GPS_RAW_INT, 74 VFR_HUD  – telemetry, shown in widgets
//    30  ATTITUDE         – roll/pitch/yaw → ADI
//    32  LOCAL_POSITION_NED – x/y/z       → 3-D view
//
//   Logged on state change only:
//     0  HEARTBEAT        – armed state or flight mode changed
//   193  EKF_STATUS_REPORT – healthy ↔ degraded transition
//    42  MISSION_CURRENT  – active waypoint index changed
//
//   Always logged (true events):
//    46  MISSION_ITEM_REACHED – waypoint reached
//    77  COMMAND_ACK      – FC response to a sent command
//   253  STATUSTEXT       – free-text from FC (the main GCS message channel)
const CRC_EXTRA = {
    0: 50,
    1: 124,
   24: 24,
   30: 39,
   32: 185,
   42: 28,
   46: 11,
   74: 20,
   77: 143,
  193: 71,
  253: 83,
};
const MSG_FULL_LEN = {
    0: 9,
    1: 31,
   24: 30,
   30: 28,
   32: 28,
   42: 6,
   46: 2,
   74: 20,
   77: 10,
  193: 22,
  253: 54,
};

function mavCrc(bytes) {
  let crc = 0xFFFF;
  for (const b of bytes) {
    let tmp = (b ^ crc) & 0xFF;
    tmp ^= (tmp << 4) & 0xFF;
    crc = ((crc >> 8) ^ (tmp << 8) ^ (tmp << 3) ^ (tmp >> 4)) & 0xFFFF;
  }
  return crc;
}

class MAVParser {
  constructor(cb) { this._cb=cb; this._buf=[]; this._state=0; this._need=0; }
  feed(data) { for (const b of data) this._byte(b); }
  _byte(b) {
    if (this._state===0) {
      if (b!==0xFD) return;
      this._buf=[b]; this._state=1; this._need=9; return;
    }
    this._buf.push(b); this._need--;
    if      (this._state===1&&this._need===0){ this._need=this._buf[1]; this._state=2; }
    else if (this._state===2&&this._need===0){ this._need=2;            this._state=3; }
    else if (this._state===3&&this._need===0){ this._dispatch();        this._state=0; }
  }
  _dispatch() {
    const b=this._buf, len=b[1];
    const mid=b[7]|(b[8]<<8)|(b[9]<<16);
    if (!(mid in CRC_EXTRA)) return;
    const body=b.slice(1,10+len);
    const crcR=b[10+len]|(b[11+len]<<8);
    if (mavCrc([...body,CRC_EXTRA[mid]])!==crcR) return;
    const fl=MSG_FULL_LEN[mid]||len;
    const pad=new Uint8Array(fl);
    pad.set(new Uint8Array(b.slice(10,10+len)));
    this._cb(mid, new DataView(pad.buffer));
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmt(v)    { return (v>=0?'+':'')+v.toFixed(3)+' m'; }
function fmtDeg(r) { return (r>=0?'+':'')+(r*180/Math.PI).toFixed(1)+'°'; }

// ─── MAVLink event log ────────────────────────────────────────────────────────
// No throttle here — callers decide when to call (change-detection or always).
const LOG_MAX=120;

function mavLog(cls, text) {
  const d=new Date();
  const ts=`${d.getHours().toString().padStart(2,'0')}:`+
           `${d.getMinutes().toString().padStart(2,'0')}:`+
           `${d.getSeconds().toString().padStart(2,'0')}`;
  const box=G('mavlog');
  const row=document.createElement('div');
  row.className=`ml ${cls}`;
  row.innerHTML=`<span class="ml-ts">${ts}</span>${text}`;
  box.appendChild(row);
  while (box.children.length>LOG_MAX) box.removeChild(box.firstChild);
  box.scrollTop=box.scrollHeight;
}

// ─── Message handler ──────────────────────────────────────────────────────────
const ARDU_MODES=['STABILIZE','ACRO','ALT_HOLD','AUTO','GUIDED','LOITER','RTL',
                  'CIRCLE','','LAND','','DRIFT','','SPORT','FLIP','AUTOTUNE','POSHOLD',
                  'BRAKE','THROW','AVOID','GUIDED_NOGPS','SMART_RTL'];
const ACK_RES=['ACCEPTED','TMP REJECT','DENIED','UNSUPPORTED','FAILED','IN PROGRESS','CANCELLED'];

function onMavMsg(mid, dv) {
  lastMsgTime=Date.now()/1000;

  if (mid===0) {                            // HEARTBEAT – log only on state change
    const cmode=dv.getUint32(0,true), base=dv.getUint8(6);
    const armed=!!(base&0x80);
    fcArmed=armed; fcSysStatus=dv.getUint8(7);
    fcModeName=ARDU_MODES[cmode]??`MODE${cmode}`;
    if (armed!==_prevArmed) {
      mavLog('ml-hb', armed ? '>>> ARMED <<<' : '>>> DISARMED <<<');
      _prevArmed=armed;
    }
    if (cmode!==_prevCmode) {
      mavLog('ml-hb', `Mode: ${fcModeName}`);
      _prevCmode=cmode;
    }

  } else if (mid===1) {                     // SYS_STATUS – telemetry only, no log

  } else if (mid===24) {                    // GPS_RAW_INT – telemetry only, no log

  } else if (mid===30) {                    // ATTITUDE → ADI, no log
    droneRoll =dv.getFloat32(4,true);
    dronePitch=dv.getFloat32(8,true);
    droneYaw  =dv.getFloat32(12,true);

  } else if (mid===32) {                    // LOCAL_POSITION_NED → 3-D, no log
    droneX=dv.getFloat32(4,true);
    droneY=dv.getFloat32(8,true);
    droneZ=dv.getFloat32(12,true);
    droneTrail.push({x:droneX,y:droneY,z:droneZ,t:lastMsgTime});
    if (droneTrail.length>2400) droneTrail.splice(0,droneTrail.length-2400);

  } else if (mid===42) {                    // MISSION_CURRENT – log only on change
    const seq=dv.getUint16(0,true);
    if (seq!==_prevWP) { mavLog('ml-wp',`Waypoint: #${seq}`); _prevWP=seq; }

  } else if (mid===46) {                    // MISSION_ITEM_REACHED – always log
    const seq=dv.getUint16(0,true);
    mavLog('ml-wp',`Reached waypoint #${seq}`);

  } else if (mid===74) {                    // VFR_HUD – telemetry only, no log

  } else if (mid===77) {                    // COMMAND_ACK – always log
    const cmd=dv.getUint16(0,true), res=dv.getUint8(2);
    const ok=res===0;
    mavLog(ok?'ml-ack':'ml-warn', `ACK cmd:${cmd} → ${ACK_RES[res]??'RES'+res}`);

  } else if (mid===193) {                   // EKF_STATUS_REPORT – log on health change
    ekfFlags  =dv.getUint16(20,true);
    ekfHealthy=!!(ekfFlags&0x0001)&&!!(ekfFlags&0x0008)&&!(ekfFlags&0x0080);
    if (ekfHealthy!==_prevEkfOk) {
      mavLog(ekfHealthy?'ml-ekf':'ml-warn',
        ekfHealthy ? `EKF healthy  (0x${ekfFlags.toString(16).padStart(4,'0').toUpperCase()})`
                   : `EKF DEGRADED (0x${ekfFlags.toString(16).padStart(4,'0').toUpperCase()})`);
      _prevEkfOk=ekfHealthy;
    }

  } else if (mid===253) {                   // STATUSTEXT – always log, main GCS channel
    const sev=dv.getUint8(0);
    const bytes=[];
    for (let i=1;i<Math.min(51,dv.byteLength);i++){const c=dv.getUint8(i);if(c===0)break;bytes.push(c);}
    const txt=String.fromCharCode(...bytes);
    const cls= sev<=3 ? 'ml-err' : sev===4 ? 'ml-warn' : 'ml-info';
    mavLog(cls, txt);
  }
}

function _resetFlightState() {

function setConnType(type) {
  if (serialPort || udpWs) return;   // can't switch while connected
  connType = type;
  G('serial-row').style.display = type === 'serial' ? '' : 'none';
  G('udp-row').style.display    = type === 'udp'    ? '' : 'none';
  G('tab-serial').classList.toggle('sel', type === 'serial');
  G('tab-udp').classList.toggle('sel', type === 'udp');

// ─── Connect / disconnect ──────────────────────────────────────────────────────
async function toggleConnect() {

  // ── UDP (via Python backend WebSocket relay) ──────────────────────────────
  if (connType === 'udp') {
    if (udpWs) {
      udpWs.onclose = null;
      udpWs.close(); udpWs = null; serialOk = false;
      G('connect-btn').textContent = 'CONNECT UDP';
      G('connect-btn').classList.remove('active');
      G('conn-status').textContent = 'disconnected';
      _resetFlightState();
      return;
    }
    const port   = parseInt(G('udp-port').value) || 14550;
    const ws     = new WebSocket(`ws://${location.host}/ws/udp?port=${port}`);
    ws.binaryType = 'arraybuffer';
    const parser = new MAVParser(onMavMsg);
    ws.onopen = () => {
      udpWs = ws; serialOk = true;
      G('connect-btn').textContent = 'DISCONNECT';
      G('connect-btn').classList.add('active');
      G('conn-status').textContent = `UDP :${port}`;
      _resetFlightState();
    };
    ws.onmessage = e => {
      try { parser.feed(new Uint8Array(e.data)); } catch(pe) { console.warn('MAVParser:', pe); }
    };
    ws.onerror = () => { G('conn-status').textContent = 'connection error'; };
    ws.onclose = () => {
      udpWs = null; serialOk = false;
      G('connect-btn').textContent = 'CONNECT UDP';
      G('connect-btn').classList.remove('active');
      G('conn-status').textContent = 'disconnected';
      _resetFlightState();
    };
    return;
  }

  // ── Serial (WebSerial API, direct in browser) ─────────────────────────────
  if (serialPort) {
    try{await serialReader?.cancel();}catch(_){}
    try{await serialPort.close();}catch(_){}
    serialPort=null; serialReader=null; serialOk=false;
    G('connect-btn').textContent='CONNECT SERIAL';
    G('connect-btn').classList.remove('active');
    G('conn-status').textContent='disconnected';
    _resetFlightState();
    return;
  }
  if (!navigator.serial){
    G('conn-status').textContent='WebSerial not supported — use Chrome/Edge';
    G('webserial-warn').style.display='block'; return;
  }
  try {
    serialPort=await navigator.serial.requestPort();
    const baud=parseInt(G('baud-input').value)||57600;
    await serialPort.open({baudRate:baud});
    serialOk=true;
    G('connect-btn').textContent='DISCONNECT';
    G('connect-btn').classList.add('active');
    G('conn-status').textContent=`connected @ ${baud} baud`;
    _resetFlightState();
    const parser=new MAVParser(onMavMsg);
    serialReader=serialPort.readable.getReader();
    (async()=>{
      try {
        while(true){
          const{value,done}=await serialReader.read();
          if(done)break;
          try{parser.feed(value);}catch(pe){console.warn('MAVParser:',pe);}
        }
        G('conn-status').textContent='port closed by device';
      }catch(e){G('conn-status').textContent=`read error: ${e.message}`;}
      serialOk=false;
    })();
  } catch(e){G('conn-status').textContent='cancelled or error';serialPort=null;}
}
window.toggleConnect=toggleConnect;

// ─── Coordinate conversion (NED → Three.js) ──────────────────────────────────
const tv=(x,y,z)=>new THREE.Vector3(x,-z,-y);

// ─── ADI – artificial horizon ─────────────────────────────────────────────────
function drawHorizon(roll, pitch) {
  const cv=G('horizon-canvas'); if(!cv)return;
  const ctx=cv.getContext('2d');
  const cw=cv.width,ch=cv.height,cx=cw/2,cy=ch/2;
  const s=ch/240; // scale factor — all magic numbers were tuned for 240px height

  ctx.clearRect(0,0,cw,ch);
  ctx.save();
  ctx.beginPath(); ctx.roundRect(0,0,cw,ch,4*s); ctx.clip();

  if (roll===null||pitch===null) {
    ctx.fillStyle='#141414'; ctx.fillRect(0,0,cw,ch);
    ctx.fillStyle='#383838'; ctx.font=`${11*s}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('NO ATTITUDE DATA',cx,cy);
    ctx.restore(); return;
  }

  // ── Rotating sky / ground ────────────────────────────────────────────────────
  ctx.translate(cx,cy);
  ctx.rotate(roll);
  const pxPerRad=95*s;
  const po=pitch*pxPerRad;  // positive pitch → horizon drops → more sky

  ctx.fillStyle='#1a508a'; ctx.fillRect(-cw,-ch*2,cw*2,ch*2+po); // sky
  ctx.fillStyle='#5aaa20'; ctx.fillRect(-cw,po,cw*2,ch*2);        // ground

  // Horizon line
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.5*s;
  ctx.beginPath(); ctx.moveTo(-cw,po); ctx.lineTo(cw,po); ctx.stroke();

  // Pitch ladder (every 5°, labels every 10°)
  const degPx=pxPerRad*(Math.PI/180);
  ctx.font=`${8*s}px monospace`; ctx.textAlign='right'; ctx.textBaseline='middle';
  for (let deg=-30;deg<=30;deg+=5) {
    if (deg===0) continue;
    const py=po-deg*degPx;
    if (Math.abs(py)>ch*0.88) continue;
    const major=deg%10===0;
    const lw=(major?28:14)*s;
    ctx.strokeStyle=`rgba(255,255,255,${major?.72:.38})`; ctx.lineWidth=(major?1.5:1)*s;
    ctx.beginPath(); ctx.moveTo(-lw,py); ctx.lineTo(lw,py); ctx.stroke();
    if (major) {
      ctx.fillStyle='rgba(255,255,255,0.72)';
      ctx.fillText(`${Math.abs(deg)}`,-lw-3*s,py);
    }
  }

  ctx.restore(); // end rotating section

  // ── Aircraft symbol (fixed) ───────────────────────────────────────────────────
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.5*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-42*s,cy); ctx.lineTo(cx-12*s,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-12*s,cy); ctx.lineTo(cx-12*s,cy+7*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+12*s,cy); ctx.lineTo(cx+42*s,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+12*s,cy); ctx.lineTo(cx+12*s,cy+7*s); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,3.5*s,0,Math.PI*2);
  ctx.fillStyle='#FFD700'; ctx.fill();

  // ── Roll arc + pointer ────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(cx,cy);
  const arcR=Math.min(cx,cy)-4*s;
  ctx.strokeStyle='rgba(255,255,255,0.20)'; ctx.lineWidth=1*s;
  ctx.beginPath(); ctx.arc(0,0,arcR,-5*Math.PI/6,-Math.PI/6); ctx.stroke();
  for (const deg of [-60,-45,-30,-20,-10,0,10,20,30,45,60]) {
    const a=-Math.PI/2+deg*(Math.PI/180);
    const major=deg%30===0;
    const tk=(major?8:4)*s;
    ctx.strokeStyle=`rgba(255,255,255,${major?.55:.28})`; ctx.lineWidth=(major?1.5:1)*s;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*arcR,      Math.sin(a)*arcR);
    ctx.lineTo(Math.cos(a)*(arcR-tk), Math.sin(a)*(arcR-tk));
    ctx.stroke();
  }
  ctx.rotate(roll);
  ctx.fillStyle='#FFD700';
  ctx.beginPath();
  ctx.moveTo(0,-(arcR-1*s)); ctx.lineTo(-5*s,-(arcR-11*s)); ctx.lineTo(5*s,-(arcR-11*s));
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Border
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1*s;
  ctx.beginPath(); ctx.roundRect(0,0,cw,ch,4*s); ctx.stroke();
}

// ─── Panel update ─────────────────────────────────────────────────────────────
const GREEN='#3DFF7A',ORANGE='#FFB300',RED='#FF4444',GREY='#555';
function setSt(id,t,c){const e=G(id);e.textContent=t;e.style.color=c;}
function setFlag(id,val,inv=false){
  if(val==null){setSt(id,'?',GREY);return;}
  setSt(id,'●',(inv?!val:val)?GREEN:RED);
}

function updatePanel() {
  const age=lastMsgTime?(Date.now()/1000-lastMsgTime):null;
  const stale=!serialOk||age==null||age>2;

  if (!serialOk)             setSt('telem-st','—',          GREY);
  else if(age==null||age>3)  setSt('telem-st','NO SIGNAL',  ORANGE);
  else                       setSt('telem-st','CONNECTED',  GREEN);

  drawHorizon(stale?null:droneRoll, stale?null:dronePitch);

  if (droneRoll!==null&&!stale){
    G('att-angles').textContent=`R ${fmtDeg(droneRoll)}  P ${fmtDeg(dronePitch)}  Y ${fmtDeg(droneYaw)}`;
    G('att-angles').style.color='#666';
  } else if (droneRoll!==null){
    G('att-angles').textContent='STALE'; G('att-angles').style.color='#444';
  } else {
    G('att-angles').textContent='';
  }

  // Status badges
  if (fcArmed) {
    G('fc-armed').textContent='ARMED';
    G('fc-armed').style.color=RED; G('fc-armed').style.borderColor='#662222';
  } else {
    G('fc-armed').textContent='DISARMED';
    G('fc-armed').style.color='#555'; G('fc-armed').style.borderColor='#2a2a2a';
  }
  const ready=serialOk&&fcSysStatus>=3&&ekfHealthy!==false;
  G('fc-ready').textContent=ready?'READY':'NOT READY';
  G('fc-ready').style.color=ready?GREEN:ORANGE;
  G('fc-ready').style.borderColor=ready?'#1a4a1a':'#4a3000';
  const ekfOk=ekfHealthy===true;
  G('fc-ekf').textContent=ekfHealthy===null?'EKF ?':ekfOk?'EKF OK':'EKF ERR';
  G('fc-ekf').style.color=ekfHealthy===null?GREY:ekfOk?GREEN:RED;
  G('fc-ekf').style.borderColor=ekfHealthy===null?'#2a2a2a':ekfOk?'#1a4a1a':'#4a1a1a';
  G('fc-mode').textContent=serialOk?fcModeName:'?';
  G('fc-mode').style.color=serialOk?GREEN:GREY;

  if (droneX!=null){
    G('pos-x').textContent=`X  ${fmt(droneX)}`;
    G('pos-y').textContent=`Y  ${fmt(droneY)}`;
    G('pos-z').textContent=`Z↓ ${fmt(droneZ)}`;
  }
}

function trailColor(t){
  const lp=(t,xp,fp)=>{for(let i=0;i<xp.length-1;i++)if(t<=xp[i+1]){const f=(t-xp[i])/(xp[i+1]-xp[i]);return fp[i]+f*(fp[i+1]-fp[i]);}return fp[fp.length-1];};
  return[lp(t,[0,.5,1],[1,1,.2]),lp(t,[0,.5,1],[.13,.65,1]),lp(t,[0,.5,1],[.13,0,.26])];
}
function updateTrail(pts){
  const n=Math.min(pts.length,MAX_T);
  for(let i=0;i<n;i++){const p=pts[i],v=tv(p.x,p.y,p.z),t=n>1?i/(n-1):1;
    tPos[i*3]=v.x;tPos[i*3+1]=v.y;tPos[i*3+2]=v.z;
    const[r,g,b]=trailColor(t);tCol[i*3]=r;tCol[i*3+1]=g;tCol[i*3+2]=b;}
  tPA.needsUpdate=true;tCA.needsUpdate=true;tGeom.setDrawRange(0,n);
}

// ─── Scale bar ────────────────────────────────────────────────────────────────
const SSTEPS=[.02,.05,.1,.2,.5,1,2,5];
const _s0=new THREE.Vector3(),_s1=new THREE.Vector3();
function updateScaleBar(){
  const W2=W()/2;
  for(const d of SSTEPS){
    _s0.set(0,0,0).project(camera); _s1.set(d,0,0).project(camera);
    const px=Math.abs(_s1.x-_s0.x)*W2;
    if(px>=50&&px<=220){
      G('scale-line').style.width=px.toFixed(1)+'px';
      G('scale-text').textContent=d<1?`${Math.round(d*100)} cm`:`${d} m`;
      return;
    }
  }
}

// ─── Hamburger menu ──────────────────────────────────────────────────────────
let _menuOpen=false;
function toggleMenu(){
  _menuOpen=!_menuOpen;
  G('menu-dropdown').style.display=_menuOpen?'flex':'none';
}
document.addEventListener('click',e=>{
  if(_menuOpen&&!G('menu-widget').contains(e.target)){
    _menuOpen=false; G('menu-dropdown').style.display='none';
  }
});
window.toggleMenu=toggleMenu;

// ─── LH pose editor ───────────────────────────────────────────────────────────
let _lhSelIdx=0;

function _matToEuler(R){
  const pitch=Math.asin(-R[2][0]);
  const roll =Math.atan2(R[2][1],R[2][2]);
  const yaw  =Math.atan2(R[1][0],R[0][0]);
  return{yaw:yaw*180/Math.PI, pitch:pitch*180/Math.PI, roll:roll*180/Math.PI};
}
function _eulerToMat(yDeg,pDeg,rDeg){
  const y=yDeg*Math.PI/180,p=pDeg*Math.PI/180,r=rDeg*Math.PI/180;
  const cy=Math.cos(y),sy=Math.sin(y),cp=Math.cos(p),sp=Math.sin(p),cr=Math.cos(r),sr=Math.sin(r);
  return[[cy*cp,cy*sp*sr-sy*cr,cy*sp*cr+sy*sr],
         [sy*cp,sy*sp*sr+cy*cr,sy*sp*cr-cy*sr],
         [-sp,  cp*sr,         cp*cr          ]];
}
function _lhLoad(idx){
  const lh=LIGHTHOUSES[idx];
  const[px,py,pz]=lh.pos, e=_matToEuler(lh.R);
  G('lh-x').value=px.toFixed(3); G('lh-y').value=py.toFixed(3); G('lh-z').value=pz.toFixed(3);
  G('lh-yaw').value=e.yaw.toFixed(1); G('lh-pitch').value=e.pitch.toFixed(1); G('lh-roll').value=e.roll.toFixed(1);
}
function openLhEditor(){
  _menuOpen=false; G('menu-dropdown').style.display='none';
  const sel=G('lh-sel'); sel.innerHTML='';
  LIGHTHOUSES.forEach((lh,i)=>{
    const b=document.createElement('button');
    b.className='lh-tab'+(i===_lhSelIdx?' sel':'');
    b.textContent=`LH${lh.id}`;
    b.onclick=()=>{_lhSelIdx=i; sel.querySelectorAll('.lh-tab').forEach((t,j)=>t.classList.toggle('sel',j===i)); _lhLoad(i);};
    sel.appendChild(b);
  });
  _lhLoad(_lhSelIdx);
  G('lh-modal').classList.add('open');
}
function closeLhEditor(){ G('lh-modal').classList.remove('open'); }
function applyLhPose(){
  const x=parseFloat(G('lh-x').value)||0, y=parseFloat(G('lh-y').value)||0, z=parseFloat(G('lh-z').value)||0;
  const yw=parseFloat(G('lh-yaw').value)||0, pt=parseFloat(G('lh-pitch').value)||0, rl=parseFloat(G('lh-roll').value)||0;
  LIGHTHOUSES[_lhSelIdx].pos=[x,y,z];
  LIGHTHOUSES[_lhSelIdx].R=_eulerToMat(yw,pt,rl);
  drawLighthouses(); closeLhEditor();
}
G('lh-modal').addEventListener('click',e=>{ if(e.target===G('lh-modal')) closeLhEditor(); });
window.openLhEditor=openLhEditor; window.closeLhEditor=closeLhEditor; window.applyLhPose=applyLhPose;

// ─── Animation loop ───────────────────────────────────────────────────────────
let lastTrailTick=0;
function animate(){
  requestAnimationFrame(animate);
  const now=Date.now();
  if(now-lastTrailTick>50){lastTrailTick=now;updateTrail(droneTrail.filter(p=>p.t>=now/1000-30));}
  if(droneX!=null){droneMesh.position.copy(tv(droneX,droneY,droneZ));droneMesh.visible=true;}
  updatePanel(); controls.update();
  renderer.render(scene,camera); labelRend.render(scene,camera);
  updateScaleBar();
}

new ResizeObserver(()=>{
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H()); labelRend.setSize(W(),H());
}).observe(container);

animate();
</script>

<!-- Lighthouse pose editor modal -->
<div id="lh-modal">
  <div id="lh-modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="modal-title">LIGHTHOUSE POSE</span>
      <button style="width:auto;padding:3px 8px;font-size:13px;line-height:1" onclick="closeLhEditor()">✕</button>
    </div>
    <div id="lh-sel"></div>
    <div>
      <div class="lbl" style="margin-bottom:5px">POSITION (m)</div>
      <div class="lh-row">
        <div class="lh-field"><span>X</span><input id="lh-x" type="number" step="0.01"></div>
        <div class="lh-field"><span>Y</span><input id="lh-y" type="number" step="0.01"></div>
        <div class="lh-field"><span>Z</span><input id="lh-z" type="number" step="0.01"></div>
      </div>
    </div>
    <div>
      <div class="lbl" style="margin-bottom:5px">ROTATION (°)</div>
      <div class="lh-row">
        <div class="lh-field"><span>YAW</span><input id="lh-yaw" type="number" step="1"></div>
        <div class="lh-field"><span>PITCH</span><input id="lh-pitch" type="number" step="1"></div>
        <div class="lh-field"><span>ROLL</span><input id="lh-roll" type="number" step="1"></div>
      </div>
    </div>
    <div class="lh-btns">
      <button onclick="applyLhPose()">APPLY</button>
      <button class="btn-cancel" onclick="closeLhEditor()">CANCEL</button>
    </div>
  </div>
</div>
