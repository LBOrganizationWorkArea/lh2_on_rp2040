<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LH2 Positions — LUBES GCS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111; color: #ccc;
  font-family: 'Courier New', monospace;
  display: flex; height: 100vh; overflow: hidden;
}
#panel {
  width: 400px; min-width: 400px; background: #161616;
  border-right: 1px solid #222; padding: 10px;
  display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
}
h1 { font-size: 13px; color: #ccc; letter-spacing: 1.5px; }
.grp-lbl { font-size: 9px; color: #444; letter-spacing: 1px; }
hr { border: none; border-top: 1px solid #1e1e1e; }

/* Mode banner */
#mode-banner {
  font-size: 11px; border-radius: 4px; padding: 6px 10px;
  border: 1px solid; letter-spacing: 0.5px;
}
.banner-neutral { background: #1b1b1b; border-color: #333; color: #666; }
.banner-backend  { background: #0e1f12; border-color: #204a2c; color: #4adf8c; }
.banner-serial   { background: #0e1b26; border-color: #1a4060; color: #4ab8ef; }
.banner-warn     { background: #2a1a00; border-color: #a06020; color: #ffa040; }

/* Connection widget */
#conn-widget {
  background: #1b1b1b; border: 1px solid #282828; border-radius: 5px;
  padding: 8px; display: flex; flex-direction: column; gap: 6px;
}
select {
  background: #1e1e1e; color: #ddd; border: 1px solid #2e2e2e; border-radius: 3px;
  padding: 3px 6px; font-size: 12px; font-family: monospace; outline: none;
}
select:focus { border-color: #444; }
#conn-status { font-size: 10px; color: #555; min-height: 13px; }

/* Param status */
#param-st { font-size: 11px; color: #555; min-height: 13px; }

/* Buttons */
button {
  background: #16281c; border: 1px solid #204a2c; color: #6adf8c;
  border-radius: 4px; font-size: 11px; padding: 7px 10px; cursor: pointer;
  font-family: inherit; letter-spacing: 0.5px; flex: 1;
}
button:hover { background: #1c3524; }
button.active { background: #3a1a1a; color: #FF6666; border-color: #FF6666; }
button.send { background: #0e2028; border-color: #1a4060; color: #4acfef; }
button.send:hover { background: #152830; }
button:disabled { opacity: 0.4; cursor: default; }
.row-btns { display: flex; gap: 6px; }

/* BS cards */
.bs-card {
  background: #1b1b1b; border: 1px solid #282828; border-radius: 5px;
  padding: 8px; display: flex; flex-direction: column; gap: 6px;
}
.bs-head { display: flex; align-items: center; gap: 7px; }
.bs-swatch { width: 10px; height: 10px; border-radius: 50%; flex: none; }
.bs-title { font-size: 12px; font-weight: bold; color: #eee; }
.field-row { display: flex; gap: 5px; }
.field { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.field > span { font-size: 9px; color: #555; letter-spacing: 1px; }
.field input[type=number] {
  background: #0e0e0e; border: 1px solid #2a2a2a; border-radius: 3px;
  color: #ccc; font-family: inherit; font-size: 11px; padding: 3px 5px; width: 100%;
}
.field input[type=number]:focus { border-color: #3a3a3a; outline: none; }
.field input.pending { border-color: #3a6030; color: #7adf9c; }

/* R matrix grid */
.r-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
.r-cell { display: flex; flex-direction: column; gap: 2px; }
.r-cell > span { font-size: 8px; color: #3a3a3a; }
.r-cell input[type=number] {
  background: #0c0c0c; border: 1px solid #222; border-radius: 3px;
  color: #888; font-family: inherit; font-size: 10px; padding: 2px 4px;
}
.r-cell input[type=number]:focus { border-color: #3a3a3a; outline: none; color: #bbb; }

/* Log */
#log-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; min-height: 0; }
#log-out {
  overflow-y: auto; min-height: 50px; max-height: 120px;
  background: #0e0e0e; border: 1px solid #1e1e1e; border-radius: 3px; padding: 4px;
}
.log-row  { font-size: 10px; color: #555; line-height: 1.5; }
.log-ok   { color: #3DFF7A; }
.log-err  { color: #FF6655; }
.log-warn { color: #FFB300; }

/* 3D scene */
#scene-container { flex: 1; position: relative; }
#scene-container canvas,
#scene-container > div { position: absolute !important; top:0; left:0; width:100% !important; height:100% !important; }
.label3d { font-size: 12px; font-family: monospace; pointer-events: none; user-select: none; text-shadow: 0 0 4px #000; }
#no3d {
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #333; pointer-events: none;
}
</style>
</head>
<body>

<div id="panel">
  <h1>LH2 BASE STATION POSITIONS</h1>

  <div id="mode-banner" class="banner-neutral">Detecting connection mode…</div>

  <!-- Serial widget — shown only in WebSerial mode -->
  <div id="conn-widget" style="display:none">
    <div class="grp-lbl">SERIAL CONNECTION  (Chrome / Edge only)</div>
    <div style="display:flex;gap:6px;align-items:center">
      <select id="baud-sel">
        <option value="57600">57600</option>
        <option value="115200">115200</option>
        <option value="921600" selected>921600</option>

      <span style="font-size:11px;color:#555">baud</span>
    </div>
    <button id="conn-btn" onclick="toggleConnect()">CONNECT SERIAL</button>
    <div id="conn-status">—</div>
  </div>

  <div id="param-st">—</div>

  <div class="row-btns">
    <button id="refresh-btn" onclick="refreshFromFC()" disabled>REFRESH FROM FC</button>

  <div id="bs-list"></div>

    <div id="log-out"></div>
  </div>
</div>

<div id="scene-container">
  <div id="no3d">3D scene loading…</div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">

// ─── Helpers ──────────────────────────────────────────────────────────────────
const G    = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));

// ─── MAVLink constants ────────────────────────────────────────────────────────
const CRC_EXTRA = {  0: 50,   20: 214, 22: 220, 23: 168 };
const MSG_FULL  = {  0:  9,   22:  25 };

// ─── MAVLink CRC-16/MCRF4XX ──────────────────────────────────────────────────
function mavCrc(bytes) {
  let crc = 0xFFFF;
  for (const b of bytes) {
    let t = (b ^ crc) & 0xFF; t ^= (t << 4) & 0xFF;
    crc = ((crc >> 8) ^ (t << 8) ^ (t << 3) ^ (t >> 4)) & 0xFFFF;
  }
  return crc;
}

// ─── MAVLink v2 stream parser ─────────────────────────────────────────────────
class MAVParser {
  constructor(cb) { this._cb = cb; this._buf = []; this._s = 0; this._n = 0; }
  feed(data) { for (const b of data) this._byte(b); }
  _byte(b) {
    if (this._s === 0) { if (b !== 0xFD) return; this._buf = [b]; this._s = 1; this._n = 9; return; }
    this._buf.push(b); this._n--;
    if (this._s === 1 && this._n === 0) {
      this._n = this._buf[1]; this._s = this._n ? 2 : 3;
      if (!this._n) this._n = 2;
    } else if (this._s === 2 && this._n === 0) { this._n = 2; this._s = 3; }
    else if   (this._s === 3 && this._n === 0) { this._dispatch(); this._s = 0; }
  }
  _dispatch() {
    const b = this._buf, len = b[1];
    const mid = b[7] | (b[8] << 8) | (b[9] << 16);
    if (!(mid in CRC_EXTRA)) return;
    const crcR = b[10 + len] | (b[11 + len] << 8);
    if (mavCrc([...b.slice(1, 10 + len), CRC_EXTRA[mid]]) !== crcR) return;
    const fl = MSG_FULL[mid] || len;
    const pad = new Uint8Array(fl);
    pad.set(new Uint8Array(b.slice(10, 10 + len)));
    this._cb(mid, new DataView(pad.buffer), b[5], b[6]);
  }
}

// ─── MAVLink v2 outbound ──────────────────────────────────────────────────────
let _seq = 0;
function buildPkt(mid, payload, crcExtra) {
  const hdr  = [payload.length, 0, 0, _seq++ & 0xFF, 255, 190,
                mid & 0xFF, (mid >> 8) & 0xFF, (mid >> 16) & 0xFF];
  const body = [...hdr, ...payload];
  const crc  = mavCrc([...body, crcExtra]);
  return new Uint8Array([0xFD, ...body, crc & 0xFF, crc >> 8]);
}
function buildHeartbeat() {
  return buildPkt(0, [0,0,0,0, 6, 8, 0, 0, 3], 50);
}
function buildParamRequestRead(name, sys, comp) {
  const p = new Uint8Array(20);
  new DataView(p.buffer).setInt16(0, -1, true);
  p[2] = sys; p[3] = comp;
  p.set(new TextEncoder().encode(name).subarray(0, 16), 4);
  return buildPkt(20, Array.from(p), 214);
}
function buildParamSet(name, value, sys, comp) {
  const p = new Uint8Array(23);
  new DataView(p.buffer).setFloat32(0, value, true);
  p[4] = sys; p[5] = comp;
  p.set(new TextEncoder().encode(name).subarray(0, 16), 6);
  p[22] = 9;  // MAV_PARAM_TYPE_REAL32
  return buildPkt(23, Array.from(p), 168);
}

// ─── LH2 parameter metadata ───────────────────────────────────────────────────
const LH2_PARAM_NAMES = [
  'LH2_NUM_BS',
  'LH2_BS0_X','LH2_BS0_Y','LH2_BS0_Z',
  'LH2_BS0_R00','LH2_BS0_R01','LH2_BS0_R02',
  'LH2_BS0_R10','LH2_BS0_R11','LH2_BS0_R12',
  'LH2_BS0_R20','LH2_BS0_R21','LH2_BS0_R22',
  'LH2_BS1_X','LH2_BS1_Y','LH2_BS1_Z',
  'LH2_BS1_R00','LH2_BS1_R01','LH2_BS1_R02',
  'LH2_BS1_R10','LH2_BS1_R11','LH2_BS1_R12',
  'LH2_BS1_R20','LH2_BS1_R21','LH2_BS1_R22',
];
const NUM_BS   = 2;
const PALETTE  = [0xFF66FF, 0x66FFFF];
const BS_META  = Array.from({length: NUM_BS}, (_, i) => ({
  posKeys: [`LH2_BS${i}_X`, `LH2_BS${i}_Y`, `LH2_BS${i}_Z`],
  rKeys:   Array.from({length: 3}, (__, r) =>
             Array.from({length: 3}, (___, c) => `LH2_BS${i}_R${r}${c}`)),
}));

// ─── Euler ↔ R ────────────────────────────────────────────────────────────────
function cross(a,b) { return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]]; }
function norm(v)    { const l=Math.hypot(v[0],v[1],v[2])||1; return [v[0]/l,v[1]/l,v[2]/l]; }

function eulerToR(yDeg, pDeg, rDeg) {
  const [y,p,r] = [yDeg,pDeg,rDeg].map(d => d*Math.PI/180);
  const col0 = [Math.cos(p)*Math.cos(y), Math.cos(p)*Math.sin(y), -Math.sin(p)];
  const aux  = Math.abs(col0[2])>.999 ? [1,0,0] : [0,0,1];
  const dot  = aux.reduce((s,v,i)=>s+v*col0[i],0);
  const ref  = norm(aux.map((v,i)=>v-dot*col0[i]));
  const c0r  = cross(col0,ref);
  const [cr,sr] = [Math.cos(r),Math.sin(r)];
  const col1 = ref.map((v,i)=>v*cr+c0r[i]*sr);
  const col2 = cross(col0,col1);
  return [[col0[0],col1[0],col2[0]],[col0[1],col1[1],col2[1]],[col0[2],col1[2],col2[2]]];
}
function rToEuler(R) {
  const sp = Math.min(1,Math.max(-1,-R[2][0]));
  const p  = Math.asin(sp)*180/Math.PI;
  if (Math.abs(sp)>.999) return {yaw:0,pitch:p,roll:Math.atan2(-R[1][1],R[0][1])*180/Math.PI};
  const y   = Math.atan2(R[1][0],R[0][0])*180/Math.PI;
  const col0= [R[0][0],R[1][0],R[2][0]];
  const aux = Math.abs(col0[2])>.999 ? [1,0,0] : [0,0,1];
  const dot = aux.reduce((s,v,i)=>s+v*col0[i],0);
  const ref = norm(aux.map((v,i)=>v-dot*col0[i]));
  const c0r = cross(col0,ref);
  const col1= [R[0][1],R[1][1],R[2][1]];
  return {yaw:y,pitch:p,roll:Math.atan2(col1.reduce((s,v,i)=>s+v*c0r[i],0),col1.reduce((s,v,i)=>s+v*ref[i],0))*180/Math.PI};
}

// ─── App state ────────────────────────────────────────────────────────────────
let mode = null;          // 'backend' | 'serial'
let fcSysId = 1, fcCompId = 1;
let serialPort = null, serialReader = null, serialWriter = null;
let _hbTimer = null, _serialReady = false;
let receivedCount = 0;

const bsData    = Array.from({length:NUM_BS},(_,i)=>({x:i?2.26:0,y:0,z:3.45,yaw:0,pitch:90,roll:180}));
const posFields = [];
const eulFields = [];
const rFields   = [];

// ─── Logging ──────────────────────────────────────────────────────────────────
function log(msg, cls='log-row') {
  const box = G('log-out');
  const d   = document.createElement('div'); d.className=cls;
  d.textContent=`[${new Date().toTimeString().slice(0,8)}] ${msg}`;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
  if (box.children.length>60) box.removeChild(box.firstChild);
}
function setStatus(msg, type='neutral') {
  G('param-st').textContent = msg;
  G('param-st').style.color = type==='ok'?'#4adf8c':type==='warn'?'#ffa040':type==='err'?'#FF6655':'#555';
}

// ─── UI: BS cards ─────────────────────────────────────────────────────────────
function renderCards() {
  const list = G('bs-list'); list.innerHTML='';
  bsData.forEach((d,i) => {
    const col  = '#'+PALETTE[i].toString(16).padStart(6,'0');
    const card = document.createElement('div'); card.className='bs-card';

    const head=document.createElement('div'); head.className='bs-head';
    const sw=document.createElement('div'); sw.className='bs-swatch'; sw.style.background=col;
    const tl=document.createElement('div'); tl.className='bs-title'; tl.textContent=`BS${i}`;
    head.append(sw,tl); card.appendChild(head);

    card.appendChild(Object.assign(document.createElement('div'),{className:'grp-lbl',textContent:'POSITION (m)'}));
    const pr=document.createElement('div'); pr.className='field-row';
    posFields[i]={};
    for (const [k,v] of [['x',d.x],['y',d.y],['z',d.z]]) {
      const w=document.createElement('div'); w.className='field';
      const s=document.createElement('span'); s.textContent=k.toUpperCase();
      const inp=document.createElement('input'); inp.type='number'; inp.step='0.01'; inp.value=v.toFixed(4);
      inp.addEventListener('input',()=>{d[k]=parseFloat(inp.value)||0; drawScene();});
      w.append(s,inp); pr.appendChild(w); posFields[i][k]=inp;
    }
    card.appendChild(pr);

    card.appendChild(Object.assign(document.createElement('div'),{className:'grp-lbl',textContent:'ORIENTATION — yaw / pitch / roll (°)'}));
    const or=document.createElement('div'); or.className='field-row';
    eulFields[i]={};
    for (const [k,v] of [['yaw',d.yaw],['pitch',d.pitch],['roll',d.roll]]) {
      const w=document.createElement('div'); w.className='field';
      const s=document.createElement('span'); s.textContent=k.toUpperCase();
      const inp=document.createElement('input'); inp.type='number'; inp.step='0.5'; inp.value=v.toFixed(1);
      inp.addEventListener('input',()=>{d[k]=parseFloat(inp.value)||0; _syncR(i); drawScene();});
      w.append(s,inp); or.appendChild(w); eulFields[i][k]=inp;
    }
    card.appendChild(or);

    card.appendChild(Object.assign(document.createElement('div'),{className:'grp-lbl',textContent:'R MATRIX — local→world (auto-computed; editable)'}));
    const rg=document.createElement('div'); rg.className='r-grid';
    rFields[i]=Array.from({length:3},()=>new Array(3));
    const R0=eulerToR(d.yaw,d.pitch,d.roll);
    for (let r=0;r<3;r++) for (let c=0;c<3;c++) {
      const cell=document.createElement('div'); cell.className='r-cell';
      const ls=document.createElement('span'); ls.textContent=`R${r}${c}`;
      const inp=document.createElement('input'); inp.type='number'; inp.step='0.001'; inp.value=R0[r][c].toFixed(4);
      inp.addEventListener('input',()=>{const e=rToEuler(_readR(i)); d.yaw=e.yaw; d.pitch=e.pitch; d.roll=e.roll;
        eulFields[i].yaw.value=e.yaw.toFixed(1); eulFields[i].pitch.value=e.pitch.toFixed(1); eulFields[i].roll.value=e.roll.toFixed(1); drawScene();});
      cell.append(ls,inp); rg.appendChild(cell); rFields[i][r][c]=inp;
    }
    card.appendChild(rg);
    list.appendChild(card);
  });
}
function _syncR(i) {
  const R=eulerToR(bsData[i].yaw,bsData[i].pitch,bsData[i].roll);
  for (let r=0;r<3;r++) for (let c=0;c<3;c++) rFields[i][r][c].value=R[r][c].toFixed(4);
}
function _readR(i) {
  return Array.from({length:3},(_,r)=>Array.from({length:3},(__,c)=>parseFloat(rFields[i][r][c].value)||0));
}

function applyParams(params) {
  let loaded = 0;
  for (let i=0;i<NUM_BS;i++) {
    const m=BS_META[i], d=bsData[i];
    for (const [k,pk] of [['x',m.posKeys[0]],['y',m.posKeys[1]],['z',m.posKeys[2]]]) {
      if (params[pk]!==undefined) { d[k]=params[pk]; posFields[i][k].value=params[pk].toFixed(4); loaded++; }
    }
    const R=[[0,0,0],[0,0,0],[0,0,0]]; let hasR=false;
    for (let r=0;r<3;r++) for (let c=0;c<3;c++) {
      const v=params[m.rKeys[r][c]]; if (v!==undefined) { R[r][c]=v; rFields[i][r][c].value=v.toFixed(4); hasR=true; loaded++; }
    }
    if (hasR) { const e=rToEuler(R); d.yaw=e.yaw; d.pitch=e.pitch; d.roll=e.roll;
      eulFields[i].yaw.value=e.yaw.toFixed(1); eulFields[i].pitch.value=e.pitch.toFixed(1); eulFields[i].roll.value=e.roll.toFixed(1); }
  }
  drawScene();
  return loaded;
}

function buildPayload() {
  const out={};
  for (let i=0;i<NUM_BS;i++) {
    const m=BS_META[i];
    out[m.posKeys[0]]=parseFloat(posFields[i].x.value)||0;
    out[m.posKeys[1]]=parseFloat(posFields[i].y.value)||0;
    out[m.posKeys[2]]=parseFloat(posFields[i].z.value)||0;
    const R=eulerToR(parseFloat(eulFields[i].yaw.value)||0, parseFloat(eulFields[i].pitch.value)||0, parseFloat(eulFields[i].roll.value)||0);
    for (let r=0;r<3;r++) for (let c=0;c<3;c++) out[m.rKeys[r][c]]=R[r][c];
  }
  return out;
}

// ─── Backend mode ─────────────────────────────────────────────────────────────
async function backendFetch() {
  G('refresh-btn').disabled=true;
  setStatus('Fetching params from FC via backend…');
  log('Requesting LH2 params via backend…');

  // First see if the cache already has everything
  try {
    const r = await fetch('/api/lh2/params');
    const cached = await r.json();
    const n = Object.keys(cached).filter(k=>k.startsWith('LH2_BS')).length;
    if (n >= 24) {
      const loaded = applyParams(cached);
      setStatus(`${n} params loaded from FC`, 'ok');
      log(`Loaded ${n} params from FC (cached)`, 'log-ok');
      G('refresh-btn').disabled=false; G('save-btn').disabled=false;
      return;
    }
  } catch (_) {}

  // Trigger a re-fetch from the FC
  try {
    const fr = await fetch('/api/lh2/fetch', {method:'POST'});
    const fj = await fr.json();
    if (!fj.ok) {
      setStatus('FC not connected — connect serial via main GCS first', 'warn');
      log('FC not connected via backend. Use the main GCS page to connect serial first.', 'log-warn');
      G('refresh-btn').disabled=false;
      return;
    }
  } catch (_) {
    setStatus('Backend error on /api/lh2/fetch', 'err');
    G('refresh-btn').disabled=false;
    return;
  }

  // Poll until all BS params arrive (up to 10 s)
  for (let i=0; i<20; i++) {
    await delay(500);
    try {
      const r = await fetch('/api/lh2/params');
      const data = await r.json();
      const n = Object.keys(data).filter(k=>k.startsWith('LH2_BS')).length;
      setStatus(`Loading… ${n}/24 params`);
      if (n >= 24) {
        applyParams(data);
        setStatus(`${n} params loaded from FC`, 'ok');
        log(`Loaded ${n} params from FC`, 'log-ok');
        G('refresh-btn').disabled=false; G('save-btn').disabled=false;
        return;
      }
    } catch (_) { break; }
  }

  setStatus('No LH2 params received — is lh2_bs_params.lua deployed on the FC?', 'warn');
  log('No LH2_BS* params received. Deploy lh2_bs_params.lua to APM/scripts/ on the FC SD card.', 'log-warn');
  G('refresh-btn').disabled=false;
}

async function backendSave() {
  G('save-btn').disabled=true;
  const payload = buildPayload();
  setStatus('Sending params to FC…');
  try {
    const r = await fetch('/api/lh2/params', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const j = await r.json();
    setStatus(`Sent ${j.queued} params to FC`, 'ok');
    log(`Sent ${j.queued} PARAM_SET commands via backend`, 'log-ok');
  } catch (e) {
    setStatus('Backend save failed: '+e.message, 'err');
    log('Save failed: '+e.message, 'log-err');
  }
  G('save-btn').disabled=false;
}

// ─── Serial mode ──────────────────────────────────────────────────────────────
const _paramCache = {};

function onMavMsg(mid, dv, sysid, compid) {
  if (mid === 0) {
    if (!_serialReady) {
      fcSysId=sysid; fcCompId=compid; _serialReady=true;
      G('conn-status').textContent=`FC sys=${sysid} comp=${compid}`;
      log(`FC heartbeat — sys=${sysid} comp=${compid}`, 'log-ok');
      // Auto-fetch immediately after first heartbeat
      _serialAutoFetch();
    }
  } else if (mid === 22) {
    const val   = dv.getFloat32(0, true);
    const bytes = []; for (let i=8;i<24;i++){const c=dv.getUint8(i);if(c===0)break;bytes.push(c);}
    const name  = String.fromCharCode(...bytes).trim();
    if (name.startsWith('LH2_BS')) {
      _paramCache[name]=val;
      const n = Object.keys(_paramCache).length;
      setStatus(`Receiving… ${n}/24 params`);
      if (n >= 24) {
        applyParams(_paramCache);
        setStatus(`${n} params loaded from FC`, 'ok');
        log(`All 24 BS params received`, 'log-ok');
        G('save-btn').disabled=false;
      }
    }
  }
}

let _fetchInFlight = false;
async function _serialAutoFetch() {
  if (_fetchInFlight) return;
  _fetchInFlight=true;
  setStatus('Requesting LH2 params from FC…');
  log('Sending PARAM_REQUEST_READ for all LH2_BS* params…');
  Object.keys(_paramCache).forEach(k=>delete _paramCache[k]);
  for (const name of LH2_PARAM_NAMES) {
    if (!serialWriter) break;
    try { await serialWriter.write(buildParamRequestRead(name, fcSysId, fcCompId)); }
    catch (e) { log('Write error: '+e.message, 'log-err'); break; }
    await delay(20);
  }
  // Wait up to 6 s
  const deadline = Date.now()+6000;
  while (Date.now()<deadline) {
    await delay(300);
    if (Object.keys(_paramCache).length>=24) break;
  }
  if (Object.keys(_paramCache).length<1) {
    setStatus('No LH2 params — is lh2_bs_params.lua deployed on FC?', 'warn');
    log('No LH2_BS* params. Deploy lh2_bs_params.lua to APM/scripts/ on the FC SD card.', 'log-warn');
  }
  _fetchInFlight=false;
  G('refresh-btn').disabled=false;
}

async function toggleConnect() {
  if (serialPort) {
    clearInterval(_hbTimer); _hbTimer=null;
    try{await serialReader?.cancel();}catch(_){}
    try{serialWriter?.releaseLock();}catch(_){}
    try{await serialPort.close();}catch(_){}
    serialPort=null; serialReader=null; serialWriter=null; _serialReady=false;
    G('conn-btn').textContent='CONNECT SERIAL'; G('conn-btn').classList.remove('active');
    G('conn-status').textContent='disconnected'; setStatus('—');
    G('refresh-btn').disabled=true; G('save-btn').disabled=true;
    return;
  }
  if (!navigator.serial) { log('WebSerial not supported — use Chrome or Edge','log-err'); return; }
  try {
    serialPort = await navigator.serial.requestPort();
    const baud = parseInt(G('baud-sel').value)||921600;
    await serialPort.open({baudRate:baud});
    serialWriter = serialPort.writable.getWriter();
    G('conn-btn').textContent='DISCONNECT'; G('conn-btn').classList.add('active');
    G('conn-status').textContent=`connected @ ${baud} baud`;
    log(`Serial connected @ ${baud} baud`,'log-ok');
    setStatus('Waiting for FC heartbeat…');

    await serialWriter.write(buildHeartbeat());
    _hbTimer=setInterval(async()=>{if(serialWriter)try{await serialWriter.write(buildHeartbeat());}catch(_){}},1000);

    serialReader=serialPort.readable.getReader();
    const parser=new MAVParser(onMavMsg);
    (async()=>{
      try{while(true){const{value,done}=await serialReader.read();if(done)break;try{parser.feed(value);}catch(_){}}}
      catch(e){G('conn-status').textContent='read error: '+e.message;}
    })();
  } catch(e) {
    G('conn-status').textContent='cancelled or error'; serialPort=null;
  }
}

async function serialSave() {
  if (!serialWriter) { log('Connect first','log-warn'); return; }
  G('save-btn').disabled=true;
  const payload=buildPayload(); let sent=0;
  for (const [name,val] of Object.entries(payload)) {
    try { await serialWriter.write(buildParamSet(name,val,fcSysId,fcCompId)); }
    catch(e) { log('Write error: '+e.message,'log-err'); break; }
    await delay(10); sent++;
  }
  for (let i=0;i<NUM_BS;i++) _syncR(i);
  setStatus(`Sent ${sent} params — FC will echo via PARAM_VALUE`,'ok');
  log(`Sent ${sent} PARAM_SET commands`,'log-ok');
  G('save-btn').disabled=false;
}

// ─── Public button handlers ───────────────────────────────────────────────────
window.toggleConnect = toggleConnect;
window.refreshFromFC = () => { if(mode==='backend') backendFetch(); else _serialAutoFetch(); };
window.saveToFC      = () => { if(mode==='backend') backendSave(); else serialSave(); };

// ─── Mode detection & init ────────────────────────────────────────────────────
async function detectMode() {
  try {
    const ac = new AbortController();
    const t  = setTimeout(()=>ac.abort(), 700);
    const r  = await fetch('/api/lh2/params', {signal:ac.signal});
    clearTimeout(t);
    if (r.ok) return 'backend';
  } catch(_) {}
  return 'serial';
}

async function main() {
  renderCards();
  drawScene();

  mode = await detectMode();

  if (mode === 'backend') {
    G('mode-banner').textContent = 'BACKEND MODE — using GCS server (no serial needed)';
    G('mode-banner').className   = 'banner-backend';
    G('conn-widget').style.display = 'none';
    G('refresh-btn').disabled = false;
    log('Backend detected — fetching params from FC…');
    backendFetch();
  } else {
    G('mode-banner').textContent = 'BROWSER MODE — connect serial to FC directly';
    G('mode-banner').className   = 'banner-serial';
    G('conn-widget').style.display = 'flex';
    if (!navigator.serial) {
      G('mode-banner').textContent = 'BROWSER MODE — WebSerial not available (use Chrome/Edge)';
      G('mode-banner').className   = 'banner-warn';
    }
    log('No backend detected — using WebSerial mode');
  }
}

// ─── Three.js scene ───────────────────────────────────────────────────────────
let _bsObjs = [], _scene = null, _renderer = null, _camera = null, _controls = null, _labelRend = null;

function drawScene() {
  if (!_scene) return;
  _bsObjs.forEach(o=>{_scene.remove(o);if(o.geometry)o.geometry.dispose();});
  _bsObjs=[];
  const push = o => { _scene.add(o); _bsObjs.push(o); };
  const tv   = (x,y,z) => new _THREE.Vector3(x,z,y);

  bsData.forEach((d,i)=>{
    const col=PALETTE[i];
    const R=eulerToR(d.yaw,d.pitch,d.roll);
    const c0=[R[0][0],R[1][0],R[2][0]], c1=[R[0][1],R[1][1],R[2][1]], c2=[R[0][2],R[1][2],R[2][2]];

    const m=new _THREE.Mesh(new _THREE.OctahedronGeometry(0.05),new _THREE.MeshBasicMaterial({color:col}));
    m.position.copy(tv(d.x,d.y,d.z)); push(m);

    const ld=document.createElement('div'); ld.className='label3d';
    ld.textContent=`BS${i}`; ld.style.color='#'+col.toString(16).padStart(6,'0');
    const lo=new _CSS2DObject(ld); lo.position.copy(tv(d.x,d.y,d.z+.15)); push(lo);

    const mkA=(dir,len,c)=>{
      const l=new _THREE.Line(new _THREE.BufferGeometry().setFromPoints([tv(d.x,d.y,d.z),tv(d.x+dir[0]*len,d.y+dir[1]*len,d.z+dir[2]*len)]),
        new _THREE.LineBasicMaterial({color:c,linewidth:2})); push(l);};
    mkA(c0,.5,col); mkA(c1,.25,0xFFA040); mkA(c2,.25,0xFFFF40);

    const dash=new _THREE.Line(new _THREE.BufferGeometry().setFromPoints([tv(d.x,d.y,d.z),tv(d.x,d.y,0)]),
      new _THREE.LineDashedMaterial({color:0x444444,dashSize:.05,gapSize:.05}));
    dash.computeLineDistances(); push(dash);
  });
}

let _THREE, _CSS2DObject;
async function init3D() {
  const ct=G('scene-container');
  try {
    const T    = await import('three');
    const OC   = await import('three/addons/controls/OrbitControls.js');
    const CSS2 = await import('three/addons/renderers/CSS2DRenderer.js');
    _THREE = T; _CSS2DObject = CSS2.CSS2DObject;

    const W=()=>ct.clientWidth, H=()=>ct.clientHeight;
    _scene = new T.Scene(); _scene.background = new T.Color(0x111111);
    _camera = new T.PerspectiveCamera(45, W()/H(), 0.01, 200);
    _camera.position.set(3,2.5,3);
    _renderer = new T.WebGLRenderer({antialias:true});
    _renderer.setPixelRatio(devicePixelRatio); _renderer.setSize(W(),H());
    ct.appendChild(_renderer.domElement);
    _labelRend = new CSS2.CSS2DRenderer();
    _labelRend.setSize(W(),H()); _labelRend.domElement.style.pointerEvents='none';
    ct.appendChild(_labelRend.domElement);
    _controls = new OC.OrbitControls(_camera,_renderer.domElement);
    _controls.target.set(1,0,1.7); _controls.enableDamping=true; _controls.dampingFactor=0.08;

    const tv=(x,y,z)=>new T.Vector3(x,z,y);
    const AL=0.3;
    [[AL,0,0,0xFF4444,'X'],[0,AL,0,0x44FF44,'Y'],[0,0,AL,0x4488FF,'Z']].forEach(([ex,ey,ez,c,l])=>{
      _scene.add(new T.Line(new T.BufferGeometry().setFromPoints([tv(0,0,0),tv(ex,ey,ez)]),new T.LineBasicMaterial({color:c,linewidth:3})));
      const d=document.createElement('div'); d.className='label3d'; d.textContent=l; d.style.color='#'+c.toString(16);
      const o=new CSS2.CSS2DObject(d); o.position.copy(tv(ex*1.2,ey*1.2,ez*1.2)); _scene.add(o);
    });
    _scene.add(new T.GridHelper(20,40,0x1e1e1e,0x1a1a1a));

    window.addEventListener('resize',()=>{
      _camera.aspect=W()/H(); _camera.updateProjectionMatrix();
      _renderer.setSize(W(),H()); _labelRend.setSize(W(),H());
    });
    (function animate(){requestAnimationFrame(animate);_controls.update();
      _renderer.render(_scene,_camera);_labelRend.render(_scene,_camera);})();

    G('no3d').style.display='none';
    drawScene();
  } catch(e) {
    console.warn('Three.js unavailable:', e);
    G('no3d').style.display='flex';
    G('no3d').textContent='3D scene unavailable (internet required)';
  }
}

init3D();
main();
</script>
