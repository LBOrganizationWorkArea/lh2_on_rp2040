<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls }              from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ─── MAVLink constants ────────────────────────────────────────────────────────
const CRC_EXTRA = {
   0: 50,   // HEARTBEAT
  22: 220,  // PARAM_VALUE
};
const MSG_FULL_LEN = {
   0:  9,
  22: 25,
};

// ─── MAVLink CRC ──────────────────────────────────────────────────────────────
function mavCrc(bytes) {
  let crc = 0xFFFF;
  for (const b of bytes) {
    let tmp = (b ^ crc) & 0xFF;
    tmp ^= (tmp << 4) & 0xFF;
    crc = ((crc >> 8) ^ (tmp << 8) ^ (tmp << 3) ^ (tmp >> 4)) & 0xFFFF;
  }
  return crc;
}

// ─── MAVLink v2 parser ────────────────────────────────────────────────────────
// Calls cb(msgId, DataView_of_payload, sysid, compid) for validated messages.
class MAVParser {
  constructor(cb) { this._cb = cb; this._buf = []; this._state = 0; this._need = 0; }
  feed(data) { for (const b of data) this._byte(b); }
  _byte(b) {
    if (this._state === 0) {
      if (b !== 0xFD) return;
      this._buf = [b]; this._state = 1; this._need = 9; return;
    }
    this._buf.push(b); this._need--;
    if      (this._state === 1 && this._need === 0) { this._need = this._buf[1]; this._state = 2; }
    else if (this._state === 2 && this._need === 0) { this._need = 2;            this._state = 3; }
    else if (this._state === 3 && this._need === 0) { this._dispatch();          this._state = 0; }
  }
  _dispatch() {
    const b = this._buf, len = b[1];
    const mid = b[7] | (b[8] << 8) | (b[9] << 16);
    if (!(mid in CRC_EXTRA)) return;
    const body = b.slice(1, 10 + len);
    const crcR = b[10 + len] | (b[11 + len] << 8);
    if (mavCrc([...body, CRC_EXTRA[mid]]) !== crcR) return;
    const fl  = MSG_FULL_LEN[mid] || len;
    const pad = new Uint8Array(fl);
    pad.set(new Uint8Array(b.slice(10, 10 + len)));
    this._cb(mid, new DataView(pad.buffer), b[5], b[6]);
  }
}

// ─── MAVLink outbound builders ────────────────────────────────────────────────
let _mavSeq = 0;

function buildPkt(msgId, payload, crcExtra) {
  const hdr  = [payload.length, 0, 0, _mavSeq++ & 0xFF, 255, 190,
                msgId & 0xFF, (msgId >> 8) & 0xFF, (msgId >> 16) & 0xFF];
  const body = [...hdr, ...payload];
  const crc  = mavCrc([...body, crcExtra]);
  return new Uint8Array([0xFD, ...body, crc & 0xFF, crc >> 8]);
}

function buildHeartbeat() {
  // HEARTBEAT (id=0, CRC_EXTRA=50): type=GCS(6), autopilot=INVALID(8)
  return buildPkt(0, [0, 0, 0, 0, 6, 8, 0, 0, 3], 50);
}

function buildParamRequestRead(name, sysId, compId) {
  // PARAM_REQUEST_READ (id=20, CRC_EXTRA=214)
  // Serialized: param_index(int16) + target_system + target_component + param_id[16]
  const p = new Uint8Array(20);
  new DataView(p.buffer).setInt16(0, -1, true);  // param_index=-1 → read by name
  p[2] = sysId; p[3] = compId;
  p.set(new TextEncoder().encode(name).subarray(0, 16), 4);
  return buildPkt(20, Array.from(p), 214);
}

function buildParamSet(name, value, sysId, compId) {
  // PARAM_SET (id=23, CRC_EXTRA=168)
  // Serialized: param_value(float32) + target_system + target_component + param_id[16] + param_type
  const p = new Uint8Array(23);
  new DataView(p.buffer).setFloat32(0, value, true);
  p[4] = sysId; p[5] = compId;
  p.set(new TextEncoder().encode(name).subarray(0, 16), 6);
  p[22] = 9;  // MAV_PARAM_TYPE_REAL32
  return buildPkt(23, Array.from(p), 168);
}

// ─── LH2 parameter list ───────────────────────────────────────────────────────
const LH2_PARAM_NAMES = [
  'LH2_NUM_BS',
  'LH2_BS0_X', 'LH2_BS0_Y', 'LH2_BS0_Z',
  'LH2_BS0_R00', 'LH2_BS0_R01', 'LH2_BS0_R02',
  'LH2_BS0_R10', 'LH2_BS0_R11', 'LH2_BS0_R12',
  'LH2_BS0_R20', 'LH2_BS0_R21', 'LH2_BS0_R22',
  'LH2_BS1_X', 'LH2_BS1_Y', 'LH2_BS1_Z',
  'LH2_BS1_R00', 'LH2_BS1_R01', 'LH2_BS1_R02',
  'LH2_BS1_R10', 'LH2_BS1_R11', 'LH2_BS1_R12',
  'LH2_BS1_R20', 'LH2_BS1_R21', 'LH2_BS1_R22',
];
const NUM_BS  = 2;
const PALETTE = [0xFF66FF, 0x66FFFF];

const BS_META = Array.from({length: NUM_BS}, (_, i) => ({
  posKeys: [`LH2_BS${i}_X`, `LH2_BS${i}_Y`, `LH2_BS${i}_Z`],
  rKeys:   Array.from({length: 3}, (__, r) =>
             Array.from({length: 3}, (___, c) => `LH2_BS${i}_R${r}${c}`)),
}));

// ─── Math: euler (yaw/pitch/roll) ↔ R ────────────────────────────────────────
// Convention (same as docs/bs_pose_editor.html):
//   R[row][col] stored row-major; col0=boresight, col1=horiz, col2=vert sweep.
//   Local-to-world: v_world = R · v_local.

function cross(a, b) {
  return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
}
function norm(v) {
  const l = Math.hypot(v[0], v[1], v[2]) || 1;
  return [v[0]/l, v[1]/l, v[2]/l];
}

function eulerToR(yawDeg, pitchDeg, rollDeg) {
  const d2r = Math.PI / 180;
  const y = yawDeg*d2r, p = pitchDeg*d2r, r = rollDeg*d2r;
  const col0 = [Math.cos(p)*Math.cos(y), Math.cos(p)*Math.sin(y), -Math.sin(p)];
  const aux  = Math.abs(col0[2]) > 0.999 ? [1,0,0] : [0,0,1];
  const dot  = aux[0]*col0[0] + aux[1]*col0[1] + aux[2]*col0[2];
  const ref  = norm([aux[0]-dot*col0[0], aux[1]-dot*col0[1], aux[2]-dot*col0[2]]);
  const c0r  = cross(col0, ref);
  const cr   = Math.cos(r), sr = Math.sin(r);
  const col1 = [ref[0]*cr+c0r[0]*sr, ref[1]*cr+c0r[1]*sr, ref[2]*cr+c0r[2]*sr];
  const col2 = cross(col0, col1);
  return [[col0[0],col1[0],col2[0]],
          [col0[1],col1[1],col2[1]],
          [col0[2],col1[2],col2[2]]];
}

// Handles gimbal lock at pitch ≈ ±90° (typical ceiling-mount case).
function rToEuler(R) {
  const sinP = Math.min(1, Math.max(-1, -R[2][0]));
  const pitchDeg = Math.asin(sinP) * 180 / Math.PI;
  if (Math.abs(sinP) > 0.999) {
    return { yaw: 0, pitch: pitchDeg,
             roll: Math.atan2(-R[1][1], R[0][1]) * 180 / Math.PI };
  }
  const yawDeg = Math.atan2(R[1][0], R[0][0]) * 180 / Math.PI;
  const col0 = [R[0][0], R[1][0], R[2][0]];
  const aux  = Math.abs(col0[2]) > 0.999 ? [1,0,0] : [0,0,1];
  const dot  = aux[0]*col0[0] + aux[1]*col0[1] + aux[2]*col0[2];
  const ref  = norm([aux[0]-dot*col0[0], aux[1]-dot*col0[1], aux[2]-dot*col0[2]]);
  const c0r  = cross(col0, ref);
  const col1 = [R[0][1], R[1][1], R[2][1]];
  return {
    yaw:   yawDeg,
    pitch: pitchDeg,
    roll:  Math.atan2(col1[0]*c0r[0]+col1[1]*c0r[1]+col1[2]*c0r[2],
                      col1[0]*ref[0] +col1[1]*ref[1] +col1[2]*ref[2]) * 180 / Math.PI,
  };
}

// ─── Serial state ─────────────────────────────────────────────────────────────
let serialPort   = null;
let serialReader = null;
let serialWriter = null;
let fcSysId      = 1;
let fcCompId     = 1;
let _hbTimer     = null;
let _connected   = false;

// Received param cache (name → float)
let receivedParams = {};

// ─── MAVLink message handler ──────────────────────────────────────────────────
const G = id => document.getElementById(id);

function onMavMsg(mid, dv, sysid, compid) {
  if (mid === 0) {
    // HEARTBEAT from FC — capture its sysid/compid once
    if (!_connected || fcSysId === 1) {
      fcSysId  = sysid;
      fcCompId = compid;
      _connected = true;
      G('telem-st').textContent  = 'CONNECTED';
      G('telem-st').style.color  = '#3DFF7A';
      G('fetch-btn').disabled    = false;
      G('send-btn').disabled     = false;
    }
  } else if (mid === 22) {
    // PARAM_VALUE: param_id[16] at offset 8, param_value float32 at offset 0
    const val  = dv.getFloat32(0, true);
    const bytes = [];
    for (let i = 8; i < 24; i++) {
      const c = dv.getUint8(i); if (c === 0) break; bytes.push(c);
    }
    const name = String.fromCharCode(...bytes).trim();
    if (name.startsWith('LH2_')) {
      receivedParams[name] = val;
      const bsCount = Object.keys(receivedParams).filter(k => k.startsWith('LH2_BS')).length;
      G('action-st').textContent = `Received ${bsCount}/24 params…`;
    }
  }
}

// ─── Connection management ────────────────────────────────────────────────────
async function toggleConnect() {
  if (serialPort) {
    // Disconnect
    clearInterval(_hbTimer); _hbTimer = null;
    try { await serialReader?.cancel(); } catch (_) {}
    try { serialWriter?.releaseLock(); } catch (_) {}
    try { await serialPort.close(); } catch (_) {}
    serialPort = null; serialReader = null; serialWriter = null;
    _connected = false; fcSysId = 1; fcCompId = 1;
    G('conn-btn').textContent = 'CONNECT SERIAL';
    G('conn-btn').classList.remove('active');
    G('conn-status').textContent = 'disconnected';
    G('telem-st').textContent = 'WAITING…'; G('telem-st').style.color = '#555';
    G('fetch-btn').disabled = true; G('send-btn').disabled = true;
    return;
  }

  if (!navigator.serial) {
    G('webserial-warn').style.display = 'block';
    G('conn-status').textContent = 'WebSerial not supported — use Chrome or Edge';
    return;
  }

  try {
    serialPort = await navigator.serial.requestPort();
    const baud = parseInt(G('baud-sel').value) || 57600;
    await serialPort.open({ baudRate: baud });
    serialWriter = serialPort.writable.getWriter();
    G('conn-btn').textContent = 'DISCONNECT';
    G('conn-btn').classList.add('active');
    G('conn-status').textContent = `connected @ ${baud} baud`;
    log(`Connected @ ${baud} baud`, 'log-ok');

    // Send heartbeat immediately, then every second
    await serialWriter.write(buildHeartbeat());
    _hbTimer = setInterval(async () => {
      if (serialWriter) {
        try { await serialWriter.write(buildHeartbeat()); } catch (_) {}
      }
    }, 1000);

    // Read loop
    serialReader = serialPort.readable.getReader();
    const parser = new MAVParser(onMavMsg);
    (async () => {
      try {
        while (true) {
          const { value, done } = await serialReader.read();
          if (done) break;
          try { parser.feed(value); } catch (e) { console.warn('parse:', e); }
        }
      } catch (e) {
        G('conn-status').textContent = `read error: ${e.message}`;
      }
      G('telem-st').textContent = 'DISCONNECTED'; G('telem-st').style.color = '#555';
    })();

  } catch (e) {
    G('conn-status').textContent = 'cancelled or error';
    serialPort = null;
  }
}

// ─── Fetch params from FC ─────────────────────────────────────────────────────
async function fetchParams() {
  if (!serialWriter) { log('Connect first', 'log-warn'); return; }
  G('fetch-btn').disabled = true;
  receivedParams = {};
  G('action-st').textContent = `Sending ${LH2_PARAM_NAMES.length} read requests…`;
  log('Requesting LH2 params from FC…');

  for (const name of LH2_PARAM_NAMES) {
    try { await serialWriter.write(buildParamRequestRead(name, fcSysId, fcCompId)); }
    catch (e) { log(`Write error: ${e.message}`, 'log-err'); break; }
    await new Promise(r => setTimeout(r, 20));  // pace requests
  }

  // Wait up to 5 s for all 24 BS params
  const deadline = Date.now() + 5000;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 200));
    const n = Object.keys(receivedParams).filter(k => k.startsWith('LH2_BS')).length;
    if (n >= 24) break;
  }

  const n = Object.keys(receivedParams).filter(k => k.startsWith('LH2_BS')).length;
  if (n === 0) {
    G('action-st').textContent = 'No LH2 params received — is lh2_bs_params.lua deployed on the FC?';
    log('No LH2_BS* params received. Deploy lh2_bs_params.lua to APM/scripts/ on the FC SD card.', 'log-warn');
  } else {
    applyParams(receivedParams);
    G('action-st').textContent = `Loaded ${n} params from FC`;
    log(`Fetched ${n} LH2_BS* params`, 'log-ok');
  }
  G('fetch-btn').disabled = false;
}

// ─── Send params to FC ────────────────────────────────────────────────────────
async function sendParams() {
  if (!serialWriter) { log('Connect first', 'log-warn'); return; }
  G('send-btn').disabled = true;

  const payload = buildPayload();
  let sent = 0;
  for (const [name, val] of Object.entries(payload)) {
    try {
      await serialWriter.write(buildParamSet(name, val, fcSysId, fcCompId));
    } catch (e) { log(`Write error: ${e.message}`, 'log-err'); break; }
    await new Promise(r => setTimeout(r, 10));
    sent++;
  }
  // Update R matrix display from euler fields
  for (let i = 0; i < NUM_BS; i++) _syncRFromEuler(i);
  G('action-st').textContent = `Sent ${sent} params — FC will echo confirmation via PARAM_VALUE`;
  log(`Sent ${sent} PARAM_SET commands to FC`, 'log-ok');
  G('send-btn').disabled = false;
}

// Build the flat {name: float} dict to send (position + R for all BSs)
function buildPayload() {
  const out = {};
  for (let i = 0; i < NUM_BS; i++) {
    const m = BS_META[i];
    out[m.posKeys[0]] = parseFloat(posFields[i].x.value) || 0;
    out[m.posKeys[1]] = parseFloat(posFields[i].y.value) || 0;
    out[m.posKeys[2]] = parseFloat(posFields[i].z.value) || 0;
    const R = eulerToR(
      parseFloat(eulFields[i].yaw.value)   || 0,
      parseFloat(eulFields[i].pitch.value) || 0,
      parseFloat(eulFields[i].roll.value)  || 0,
    );
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        out[m.rKeys[r][c]] = R[r][c];
  }
  return out;
}

// ─── Populate UI fields from received param dict ──────────────────────────────
function applyParams(params) {
  for (let i = 0; i < NUM_BS; i++) {
    const m = BS_META[i], d = bsData[i];
    const x = params[m.posKeys[0]], y = params[m.posKeys[1]], z = params[m.posKeys[2]];
    if (x !== undefined) { d.x = x; posFields[i].x.value = x.toFixed(4); }
    if (y !== undefined) { d.y = y; posFields[i].y.value = y.toFixed(4); }
    if (z !== undefined) { d.z = z; posFields[i].z.value = z.toFixed(4); }
    const R = [[0,0,0],[0,0,0],[0,0,0]];
    let hasR = false;
    for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++) {
      const v = params[m.rKeys[r][c]];
      if (v !== undefined) { R[r][c] = v; rFields[i][r][c].value = v.toFixed(4); hasR = true; }
    }
    if (hasR) {
      const e = rToEuler(R);
      d.yaw = e.yaw; d.pitch = e.pitch; d.roll = e.roll;
      eulFields[i].yaw.value   = e.yaw.toFixed(1);
      eulFields[i].pitch.value = e.pitch.toFixed(1);
      eulFields[i].roll.value  = e.roll.toFixed(1);
    }
  }
  drawScene();
}

// ─── Logging ──────────────────────────────────────────────────────────────────
function log(msg, cls = 'log-row') {
  const box = G('log-out');
  const d   = document.createElement('div'); d.className = cls;
  d.textContent = `[${new Date().toTimeString().slice(0,8)}] ${msg}`;
  box.appendChild(d); box.scrollTop = box.scrollHeight;
  if (box.children.length > 50) box.removeChild(box.firstChild);
}

// ─── UI state ─────────────────────────────────────────────────────────────────
const bsData = [
  { x: 0,    y: 0, z: 3.45, yaw: 0, pitch: 90, roll: 180 },
  { x: 2.26, y: 0, z: 3.45, yaw: 0, pitch: 90, roll: 180 },
];
const posFields = [];
const eulFields = [];
const rFields   = [];

// ─── UI: BS cards ─────────────────────────────────────────────────────────────
function mkField(labelText, value, step, onInput) {
  const wrap = document.createElement('div'); wrap.className = 'field';
  const lbl  = document.createElement('span'); lbl.textContent = labelText;
  const inp  = document.createElement('input');
  inp.type = 'number'; inp.step = step; inp.value = value;
  inp.addEventListener('input', onInput);
  wrap.appendChild(lbl); wrap.appendChild(inp);
  return { wrap, inp };
}

function renderCards() {
  const list = G('bs-list'); list.innerHTML = '';
  bsData.forEach((d, i) => {
    const col  = '#' + PALETTE[i].toString(16).padStart(6, '0');
    const card = document.createElement('div'); card.className = 'bs-card';

    // Header
    const head  = document.createElement('div'); head.className = 'bs-head';
    const sw    = document.createElement('div'); sw.className = 'bs-swatch'; sw.style.background = col;
    const title = document.createElement('div'); title.className = 'bs-title'; title.textContent = `BS${i}`;
    head.appendChild(sw); head.appendChild(title); card.appendChild(head);

    // Position
    const posLbl = document.createElement('div'); posLbl.className = 'grp-lbl';
    posLbl.textContent = 'POSITION (m)';
    card.appendChild(posLbl);
    const posRow = document.createElement('div'); posRow.className = 'field-row';
    posFields[i] = {};
    for (const [k, v] of [['x', d.x], ['y', d.y], ['z', d.z]]) {
      const { wrap, inp } = mkField(k.toUpperCase(), v.toFixed(4), '0.01', () => {
        d[k] = parseFloat(inp.value) || 0; drawScene();
      });
      posRow.appendChild(wrap); posFields[i][k] = inp;
    }
    card.appendChild(posRow);

    // Euler angles
    const oriLbl = document.createElement('div'); oriLbl.className = 'grp-lbl';
    oriLbl.textContent = 'ORIENTATION — yaw / pitch / roll (°)';
    card.appendChild(oriLbl);
    const oriRow = document.createElement('div'); oriRow.className = 'field-row';
    eulFields[i] = {};
    for (const [k, v] of [['yaw', d.yaw], ['pitch', d.pitch], ['roll', d.roll]]) {
      const { wrap, inp } = mkField(k.toUpperCase(), v.toFixed(1), '0.5', () => {
        d[k] = parseFloat(inp.value) || 0;
        _syncRFromEuler(i); drawScene();
      });
      oriRow.appendChild(wrap); eulFields[i][k] = inp;
    }
    card.appendChild(oriRow);

    // R matrix (computed)
    const rLbl = document.createElement('div'); rLbl.className = 'grp-lbl';
    rLbl.textContent = 'R MATRIX — local→world (auto-computed; editable)';
    card.appendChild(rLbl);
    const rGrid = document.createElement('div'); rGrid.className = 'r-grid';
    rFields[i] = Array.from({length: 3}, () => new Array(3));
    const R0   = eulerToR(d.yaw, d.pitch, d.roll);
    for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++) {
      const cell = document.createElement('div'); cell.className = 'r-cell';
      const lbl  = document.createElement('span'); lbl.textContent = `R${r}${c}`;
      const inp  = document.createElement('input');
      inp.type = 'number'; inp.step = '0.001'; inp.value = R0[r][c].toFixed(4);
      inp.addEventListener('input', () => {
        const curR = _readR(i);
        const e    = rToEuler(curR);
        d.yaw = e.yaw; d.pitch = e.pitch; d.roll = e.roll;
        eulFields[i].yaw.value   = e.yaw.toFixed(1);
        eulFields[i].pitch.value = e.pitch.toFixed(1);
        eulFields[i].roll.value  = e.roll.toFixed(1);
        drawScene();
      });
      cell.appendChild(lbl); cell.appendChild(inp);
      rGrid.appendChild(cell);
      rFields[i][r][c] = inp;
    }
    card.appendChild(rGrid);
    list.appendChild(card);
  });
}

function _syncRFromEuler(i) {
  const d = bsData[i], R = eulerToR(d.yaw, d.pitch, d.roll);
  for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++)
    rFields[i][r][c].value = R[r][c].toFixed(4);
}
function _readR(i) {
  return Array.from({length: 3}, (_, r) =>
    Array.from({length: 3}, (__, c) => parseFloat(rFields[i][r][c].value) || 0));
}

// ─── Three.js scene ───────────────────────────────────────────────────────────
const container = G('scene-container');
const scene     = new THREE.Scene(); scene.background = new THREE.Color(0x111111);
const W = () => container.clientWidth, H = () => container.clientHeight;

const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.01, 200);
camera.position.set(3, 2.5, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(W(), H());
container.appendChild(renderer.domElement);

const labelRend = new CSS2DRenderer();
labelRend.setSize(W(), H()); labelRend.domElement.style.pointerEvents = 'none';
container.appendChild(labelRend.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(1, 0, 1.7); controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.update();

// World Z-up → Three.js Y-up
const tv = (x, y, z) => new THREE.Vector3(x, z, y);

function _addLine(ax,ay,az,bx,by,bz,col,w=2) {
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([tv(ax,ay,az),tv(bx,by,bz)]),
    new THREE.LineBasicMaterial({color:col,linewidth:w})));
}
function _addLabel(txt,x,y,z,col) {
  const d = document.createElement('div'); d.className='label3d'; d.textContent=txt; d.style.color=col;
  const o = new CSS2DObject(d); o.position.copy(tv(x,y,z)); scene.add(o);
}

const AL = 0.3;
_addLine(0,0,0,AL,0,0,0xFF4444,3); _addLabel('X',AL+.05,0,0,'#FF4444');
_addLine(0,0,0,0,AL,0,0x44FF44,3); _addLabel('Y',0,AL+.05,0,'#44FF44');
_addLine(0,0,0,0,0,AL,0x4488FF,3); _addLabel('Z',0,0,AL+.05,'#4488FF');
scene.add(new THREE.GridHelper(20,40,0x1e1e1e,0x1a1a1a));

let _bsObjs = [];
function drawScene() {
  _bsObjs.forEach(o => { scene.remove(o); if (o.geometry) o.geometry.dispose(); });
  _bsObjs = [];
  const push = o => { scene.add(o); _bsObjs.push(o); };

  bsData.forEach((d, i) => {
    const col  = PALETTE[i];
    const R    = eulerToR(d.yaw, d.pitch, d.roll);
    const col0 = [R[0][0],R[1][0],R[2][0]];  // boresight
    const col1 = [R[0][1],R[1][1],R[2][1]];  // horiz sweep
    const col2 = [R[0][2],R[1][2],R[2][2]];  // vert sweep

    const m = new THREE.Mesh(new THREE.OctahedronGeometry(0.05), new THREE.MeshBasicMaterial({color:col}));
    m.position.copy(tv(d.x,d.y,d.z)); push(m);

    const ld = document.createElement('div'); ld.className='label3d';
    ld.textContent=`BS${i}`; ld.style.color='#'+col.toString(16).padStart(6,'0');
    const lo = new CSS2DObject(ld); lo.position.copy(tv(d.x,d.y,d.z+.15)); push(lo);

    const mkA = (dir,len,c,w) => {
      const l = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([tv(d.x,d.y,d.z),tv(d.x+dir[0]*len,d.y+dir[1]*len,d.z+dir[2]*len)]),
        new THREE.LineBasicMaterial({color:c,linewidth:w}));
      push(l);
    };
    mkA(col0,.5,col,4); mkA(col1,.25,0xFFA040,2); mkA(col2,.25,0xFFFF40,2);

    const dash = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([tv(d.x,d.y,d.z),tv(d.x,d.y,0)]),
      new THREE.LineDashedMaterial({color:0x444444,dashSize:.05,gapSize:.05}));
    dash.computeLineDistances(); push(dash);
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderCards();
drawScene();

if (!navigator.serial) G('webserial-warn').style.display = 'block';

window.addEventListener('resize', () => {
  camera.aspect = W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H()); labelRend.setSize(W(),H());
});

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera); labelRend.render(scene,camera);
})();

window.toggleConnect = toggleConnect;
window.fetchParams   = fetchParams;
window.sendParams    = sendParams;
</script>

</body>
</html>
